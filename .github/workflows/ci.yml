name: CI

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run core tests
        run: mvn -B -pl mcp-sdk,mcp-spring-boot-starter,mcp-server-collection/mcp-server-mysql,mcp-server-collection/mcp-server-redis -am test

      - name: Package ready-to-use servers
        run: mvn -B -pl mcp-server-collection/mcp-server-mysql,mcp-server-collection/mcp-server-redis -am package -DskipTests
